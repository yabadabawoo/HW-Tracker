<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Homework Tracker</title>
  <link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#2563eb">
  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --border:#e5e7eb;
      --text:#0f172a;
      --muted:#64748b;
      --blue:#2563eb;
      --green:#16a34a;
      --red:#dc2626;
      --dark:#0f172a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:var(--bg);
      color:var(--text);
      padding:14px;
    }
    .shell{max-width:720px;margin:0 auto}
    .header{
      border-radius:16px;
      padding:14px;
      color:#fff;
      background: linear-gradient(135deg,#6D28D9 0%,#2563EB 60%,#06B6D4 100%);
    }
    .title{font-weight:900;font-size:18px}
    .subtitle{opacity:.95;font-size:12px;margin-top:4px}
    .top-actions{display:flex;gap:8px;flex-direction:column;align-items:flex-end}
    .btn{
      border:0;
      border-radius:12px;
      padding:8px 10px;
      font-weight:900;
      cursor:pointer;
    }
    .btn-ghost{
      background: rgba(255,255,255,0.18);
      color:#fff;
      border:1px solid rgba(255,255,255,0.35);
    }
    .pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .pill{
      background: rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.25);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
    }
    .tabs{
      display:grid;
      grid-template-columns: repeat(6, 1fr);
      gap:8px;
      margin-top:12px;
    }
    .tab{
      border:0;
      border-radius:12px;
      padding:10px 6px;
      font-weight:900;
      font-size:12px;
      cursor:pointer;
      background:#eef2ff;
      color:var(--text);
    }
    .tab.active{background:var(--blue);color:#fff}
    .card{
      margin-top:10px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
    }
    .section-title{font-weight:900;margin-bottom:8px}
    .hint{font-size:12px;color:var(--muted);margin-top:6px}
    input, textarea{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      font-size:14px;
      outline:none;
      background:#fff;
    }
    textarea{min-height:120px;resize:vertical}
    .primary{
      width:100%;
      border:0;
      border-radius:12px;
      padding:12px 12px;
      font-weight:900;
      color:#fff;
      background:var(--blue);
      cursor:pointer;
    }
    .grid-gap{display:grid;gap:8px}
    .err{
      border-color:#fca5a5 !important;
      background:#fff5f5 !important;
    }
    .err-msg{font-size:12px;color:var(--red);margin-top:4px}
    .record{
      margin-top:10px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:12px;
    }
    .record-top{display:flex;justify-content:space-between;gap:10px}
    .namebtn{
      border:0;
      background:transparent;
      padding:0;
      text-align:left;
      cursor:pointer;
    }
    .name{font-weight:900}
    .muted{color:var(--muted)}
    .tap{font-size:12px;color:var(--blue);font-weight:900;margin-top:2px}
    .meta{font-weight:900;font-size:12px}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .btn-green{background:var(--green);color:#fff}
    .btn-red{background:var(--red);color:#fff}
    .btn-dark{background:var(--dark);color:#fff}
    .chip{
      border:1px solid var(--border);
      background:#f1f5f9;
      color:var(--text);
      border-radius:999px;
      padding:6px 10px;
      font-weight:900;
      font-size:12px;
      cursor:pointer;
    }

    /* Toast */
    .toast-wrap{
      position:fixed;left:0;right:0;bottom:18px;
      display:flex;justify-content:center;padding:0 16px;z-index:60;
    }
    .toast{
      max-width:720px;width:100%;
      background: rgba(15,23,42,0.92);
      color:#fff;border-radius:16px;
      padding:12px 14px;font-weight:900;text-align:center;
    }

    /* Modal */
    .modal-bg{
      position:fixed;inset:0;background:rgba(0,0,0,0.5);
      display:flex;justify-content:center;align-items:flex-end;
      padding:14px;z-index:80;
    }
    .modal{
      width:100%;max-width:720px;background:#fff;border-radius:16px;
      border:1px solid var(--border);
      padding:12px;max-height:80vh;overflow:auto;
    }
    .modal-head{display:flex;justify-content:space-between;gap:10px;align-items:center}
    .modal-title{font-weight:900}
    .btn-light{
      border:1px solid var(--border);
      background:#f8fafc;
      border-radius:12px;
      padding:6px 10px;
      font-weight:900;
      cursor:pointer;
    }

    @media (max-width:560px){
      .tabs{grid-template-columns: repeat(3, 1fr);}
      .top-actions{align-items:flex-start}
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;">
        <div>
          <div class="title">Homework Tracker</div>
          <div class="subtitle">Tap a student name to generate a parent message.</div>
        </div>
        <div class="top-actions">
          <button id="btnResetHW" class="btn btn-ghost">Reset Homework</button>
          <button id="btnResetRoster" class="btn btn-ghost">Reset Roster</button>
        </div>
      </div>
      <div class="pills">
        <div class="pill" id="pillOwed">Owed: 0</div>
        <div class="pill" id="pillSub">Submitted: 0</div>
        <div class="pill" id="pillLost">Lost: 0</div>
        <div class="pill" id="pillClasses">Classes: 0</div>
      </div>
    </div>

    <div class="tabs" id="tabs"></div>

    <!-- datalists -->
    <datalist id="dlClasses"></datalist>
    <datalist id="dlStudents"></datalist>

    <div id="view"></div>
  </div>

  <!-- Toast -->
  <div class="toast-wrap" id="toastWrap" style="display:none;">
    <div class="toast" id="toastText"></div>
  </div>

  <!-- Modal -->
  <div class="modal-bg" id="modalBg" style="display:none;">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle"></div>
        <button class="btn-light" id="modalClose">Close</button>
      </div>
      <div style="height:10px;"></div>
      <div style="font-size:12px;color:#64748b;font-weight:900;">You can edit before sending.</div>
      <div style="height:8px;"></div>
      <textarea id="modalText" style="min-height:220px;"></textarea>
      <div style="height:10px;"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-green" id="modalCopy" style="flex:1 1 auto;">Copy text</button>
        <button class="btn-light" id="modalDone">Done</button>
      </div>
    </div>
  </div>

<script>
(function(){
  const KEY_REC = "hw_v11_records";
  const KEY_ROS = "hw_v11_roster";

  const STATUS = { OWED:"owed", SUB:"submitted", LOST:"lost" };

  function norm(s){ return String(s||"").trim().toLowerCase(); }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function uid(){ return Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,9); }
  function parseTime(iso){ const t=Date.parse(iso); return Number.isFinite(t)?t:Number.POSITIVE_INFINITY; }
  function fmtDDMMMYY(iso){
    if(!iso) return "-";
    const d=new Date(iso);
    if(Number.isNaN(d.getTime())) return String(iso);
    const day=String(d.getDate()).padStart(2,"0");
    const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return day+"-"+months[d.getMonth()]+"-"+String(d.getFullYear()).slice(-2);
  }
  function uniqCI(list){
    const seen=new Set(); const out=[];
    for(const x of list){
      const v=String(x||"").trim();
      if(!v) continue;
      const k=norm(v);
      if(seen.has(k)) continue;
      seen.add(k);
      out.push(v);
    }
    return out;
  }
  function splitLines(text){
    return String(text||"").replaceAll("\r","").split("\n").map(s=>s.trim()).filter(Boolean);
  }

  function buildParentMessage(studentName, owedRows){
    const rows=[...owedRows].sort((a,b)=>{
      const ta=parseTime(a.dueDate), tb=parseTime(b.dueDate);
      if(ta!==tb) return ta-tb;
      return norm(a.homework).localeCompare(norm(b.homework));
    });
    const lines=[];
    lines.push("Hi,");
    lines.push("");
    lines.push("Your child "+studentName+" has not submitted the following homework:");
    lines.push("");
    for(let i=0;i<rows.length;i++){
      lines.push(String(i+1)+". "+fmtDDMMMYY(rows[i].dueDate)+" - "+rows[i].homework);
    }
    lines.push("");
    lines.push("Please help to ensure that your child completed and submits the homework on time.");
    lines.push("");
    lines.push("Thank you.");
    return lines.join("\n");
  }

  async function copyText(text){
    try{
      await navigator.clipboard.writeText(text);
      return true;
    }catch(e){
      try{
        const ta=document.createElement("textarea");
        ta.value=text;
        ta.style.position="fixed";
        ta.style.left="-9999px";
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        const ok=document.execCommand("copy");
        ta.remove();
        return ok;
      }catch(e2){ return false; }
    }
  }

  // State
  let tab = "add";
  let records = [];
  let roster = [];

  // double-arm reset
  let armHW = false, armRoster = false;
  let armHWTimer = null, armRosterTimer = null;

  // UI refs
  const tabsEl = document.getElementById("tabs");
  const viewEl = document.getElementById("view");
  const dlClasses = document.getElementById("dlClasses");
  const dlStudents = document.getElementById("dlStudents");

  const pillOwed = document.getElementById("pillOwed");
  const pillSub = document.getElementById("pillSub");
  const pillLost = document.getElementById("pillLost");
  const pillClasses = document.getElementById("pillClasses");

  const toastWrap = document.getElementById("toastWrap");
  const toastText = document.getElementById("toastText");

  const modalBg = document.getElementById("modalBg");
  const modalTitle = document.getElementById("modalTitle");
  const modalText = document.getElementById("modalText");
  const modalClose = document.getElementById("modalClose");
  const modalCopy = document.getElementById("modalCopy");
  const modalDone = document.getElementById("modalDone");

  function showToast(msg){
    toastText.textContent = msg;
    toastWrap.style.display = "flex";
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>{ toastWrap.style.display="none"; }, 2400);
  }

  function load(){
    try{
      const a = JSON.parse(localStorage.getItem(KEY_REC) || "[]");
      if(Array.isArray(a)) records = a;
    }catch(e){ records=[]; }
    try{
      const b = JSON.parse(localStorage.getItem(KEY_ROS) || "[]");
      if(Array.isArray(b)) roster = b;
    }catch(e2){ roster=[]; }
  }

  function save(){
    try{ localStorage.setItem(KEY_REC, JSON.stringify(records)); }catch(e){}
    try{ localStorage.setItem(KEY_ROS, JSON.stringify(roster)); }catch(e2){}
  }

  function rosterByClass(){
    const m = new Map();
    for(const e of roster){
      const c = String(e.className||"").trim();
      const n = String(e.studentName||"").trim();
      if(!c || !n) continue;
      if(!m.has(c)) m.set(c, []);
      m.get(c).push(n);
    }
    for(const [c, arr] of m.entries()){
      m.set(c, uniqCI(arr).sort((a,b)=>norm(a).localeCompare(norm(b))));
    }
    return m;
  }

  function classOptions(){
    const s = new Set();
    for(const e of roster){
      const c = String(e.className||"").trim();
      if(c) s.add(c);
    }
    return Array.from(s).sort((a,b)=>norm(a).localeCompare(norm(b)));
  }

  function updateStats(){
    const owed = records.filter(r=>r.status===STATUS.OWED).length;
    const sub = records.filter(r=>r.status===STATUS.SUB).length;
    const lost = records.filter(r=>r.status===STATUS.LOST).length;
    const cls = classOptions().length;
    pillOwed.textContent = "Owed: " + owed;
    pillSub.textContent = "Submitted: " + sub;
    pillLost.textContent = "Lost: " + lost;
    pillClasses.textContent = "Classes: " + cls;
  }

  function setTab(next){
    tab = next;
    renderTabs();
    renderView();
  }

  function renderTabs(){
    const items = [
      ["add","Add"],
      ["student","By Student"],
      ["homework","By HW"],
      ["class","By Class"],
      ["students","Students"],
      ["all","All"],
    ];
    tabsEl.innerHTML = "";
    items.forEach(([k,label])=>{
      const b = document.createElement("button");
      b.className = "tab" + (tab===k ? " active" : "");
      b.textContent = label;
      b.onclick = ()=>setTab(k);
      tabsEl.appendChild(b);
    });
  }

  function renderDatalists(curClass){
    // classes
    const cls = classOptions();
    dlClasses.innerHTML = "";
    cls.forEach(c=>{
      const o=document.createElement("option");
      o.value=c;
      dlClasses.appendChild(o);
    });

    // students for current class
    const map = rosterByClass();
    const list = (curClass && map.has(curClass)) ? map.get(curClass) : [];
    dlStudents.innerHTML = "";
    list.forEach(n=>{
      const o=document.createElement("option");
      o.value=n;
      dlStudents.appendChild(o);
    });
  }

  function openModal(title, text){
    modalTitle.textContent = title;
    modalText.value = text;
    modalBg.style.display = "flex";
  }
  function closeModal(){
    modalBg.style.display = "none";
  }

  modalClose.onclick = closeModal;
  modalDone.onclick = closeModal;
  modalBg.addEventListener("click", (e)=>{ if(e.target===modalBg) closeModal(); });

  modalCopy.onclick = async function(){
    const ok = await copyText(modalText.value);
    showToast(ok ? "Copied." : "Copy failed.");
  };

  function renderView(){
    updateStats();

    // Build views
    if(tab==="add"){ renderAdd(); return; }
    if(tab==="students"){ renderStudents(); return; }
    if(tab==="student"){ renderFilter("student"); return; }
    if(tab==="homework"){ renderFilter("homework"); return; }
    if(tab==="class"){ renderFilter("class"); return; }
    if(tab==="all"){ renderAll(); return; }
  }

  function renderAdd(){
    viewEl.innerHTML = "";

    const card = document.createElement("div");
    card.className="card";
    card.innerHTML = `
      <div class="section-title">Add defaulters (up to 15)</div>

      <input id="inDue" type="date" />
      <div class="hint">This date is the due date.</div>

      <div style="height:10px"></div>
      <input id="inClass" list="dlClasses" placeholder="Class (e.g., 4C)" />

      <div style="height:10px"></div>
      <input id="inHW" placeholder="Homework name" />

      <div class="hint">Student Name suggestions will show only after you enter a Class that has a roster.</div>

      <div style="height:10px"></div>
      <div id="nameGrid" class="grid-gap"></div>

      <div style="height:12px"></div>
      <button id="btnSaveDef" class="primary">Save defaulters</button>
    `;
    viewEl.appendChild(card);

    const inDue = document.getElementById("inDue");
    const inClass = document.getElementById("inClass");
    const inHW = document.getElementById("inHW");
    const nameGrid = document.getElementById("nameGrid");
    const btnSaveDef = document.getElementById("btnSaveDef");

    inDue.value = todayISO();

    // 15 inputs
    const nameInputs = [];
    const errMsgs = [];
    for(let i=0;i<15;i++){
      const wrap = document.createElement("div");

      const inp = document.createElement("input");
      inp.placeholder = "Student Name";
      inp.setAttribute("list","dlStudents");

      const msg = document.createElement("div");
      msg.className="err-msg";
      msg.style.display="none";

      wrap.appendChild(inp);
      wrap.appendChild(msg);

      nameGrid.appendChild(wrap);
      nameInputs.push(inp);
      errMsgs.push(msg);
    }

    function clearErrors(){
      for(let i=0;i<15;i++){
        nameInputs[i].classList.remove("err");
        errMsgs[i].style.display="none";
        errMsgs[i].textContent="";
      }
    }

    function refreshStudentList(){
      const c = String(inClass.value||"").trim();
      renderDatalists(c);
    }

    inClass.addEventListener("input", ()=>{
      refreshStudentList();
      clearErrors();
    });

    btnSaveDef.onclick = ()=>{
      const dueDate = String(inDue.value||"").trim();
      const c = String(inClass.value||"").trim();
      const hw = String(inHW.value||"").trim();

      if(!dueDate || !c || !hw){
        showToast("Fill Due Date, Class, Homework.");
        return;
      }

      const map = rosterByClass();
      if(!map.has(c)){
        showToast("No roster for class "+c+". Add it in Students tab.");
        return;
      }

      // match map
      const m = new Map();
      map.get(c).forEach(n=>m.set(norm(n), n));

      const provided = [];
      for(let i=0;i<15;i++){
        const v = String(nameInputs[i].value||"").trim();
        if(v) provided.push({v, idx:i});
      }
      if(provided.length===0){
        showToast("Enter at least 1 student name.");
        return;
      }

      clearErrors();

      const matched = [];
      let hasErr = false;

      for(const it of provided){
        const canon = m.get(norm(it.v));
        if(!canon){
          hasErr = true;
          nameInputs[it.idx].classList.add("err");
          errMsgs[it.idx].textContent = "Not in class roster.";
          errMsgs[it.idx].style.display = "block";
        }else{
          matched.push(canon);
        }
      }

      if(hasErr){
        showToast("Unmatched names found. Please fix highlighted boxes.");
        return;
      }

      const unique = uniqCI(matched);
      const newRecs = unique.map(studentName=>({
        id: uid(),
        dueDate: dueDate,
        className: c,
        studentName: studentName,
        homework: hw,
        status: STATUS.OWED
      }));

      records = newRecs.concat(records);
      save();

      // clear inputs
      for(let i=0;i<15;i++) nameInputs[i].value="";
      inHW.value="";
      clearErrors();
      showToast("Saved "+newRecs.length+" defaulter(s).");

      renderView();
    };

    // initial datalist
    renderDatalists(String(inClass.value||"").trim());
  }

function recordCard(r){
  // ---- Safe field reads ----
  const studentName = String(r.studentName || "").trim();
  const className = String(r.className || "").trim();
  const homework = String(r.homework || r.homeworkName || "").trim();
  const due = String(r.dueDate || r.date || "").trim();

  // normalize status for display + buttons
  const raw = String(r.status || "").trim().toLowerCase();
  let status = raw;
  if (raw === "sub" || raw === "submit" || raw === "submitted" || raw === "done") status = "submitted";
  else if (raw === "owe" || raw === "owed") status = "owed";
  else if (raw === "lost") status = "lost";

  const wrap = document.createElement("div");
  wrap.className = "record";

  // ---- Top row ----
  const top = document.createElement("div");
  top.className = "record-top";

  const left = document.createElement("div");

  const nameBtn = document.createElement("button");
  nameBtn.type = "button";
  nameBtn.className = "namebtn";
  nameBtn.title = "Tap name to generate parent message";

  const nameLine = document.createElement("div");
  nameLine.className = "name";
  nameLine.style.fontSize = "20px";      // biggest
  nameLine.style.fontWeight = "900";
  nameLine.textContent = studentName + (className ? (" (" + className + ")") : "");

  const tap = document.createElement("div");
  tap.className = "tap";
  tap.textContent = "Tap name to generate message";

  nameBtn.appendChild(nameLine);
  nameBtn.appendChild(tap);

  // Homework line (smaller than name)
  const hwLine = document.createElement("div");
  hwLine.style.marginTop = "8px";
  hwLine.style.fontSize = "14px";
  hwLine.innerHTML = "<b>HW:</b> " + (homework || "-");

  // Due line
  const dueLine = document.createElement("div");
  dueLine.className = "muted";
  dueLine.style.fontSize = "12px";
  dueLine.style.marginTop = "2px";
  dueLine.textContent = "Due: " + (due ? fmtDDMMMYY(due) : "-");

  left.appendChild(nameBtn);
  left.appendChild(hwLine);
  left.appendChild(dueLine);

  const right = document.createElement("div");
  right.className = "meta";
  right.textContent = status.toUpperCase();

  top.appendChild(left);
  top.appendChild(right);

  // ---- Actions ----
  const actions = document.createElement("div");
  actions.className = "actions";

  if (status === "owed") {
    const btnSub = document.createElement("button");
    btnSub.type = "button";
    btnSub.className = "btn btn-green";
    btnSub.textContent = "Submit";
    btnSub.onclick = () => {
      records = records.map(x => x.id === r.id ? ({ ...x, status: "submitted" }) : x);
      save();
      renderView();
    };

    const btnLost = document.createElement("button");
    btnLost.type = "button";
    btnLost.className = "btn btn-red";
    btnLost.textContent = "Lost";
    btnLost.onclick = () => {
      records = records.map(x => x.id === r.id ? ({ ...x, status: "lost" }) : x);
      save();
      renderView();
    };

    actions.appendChild(btnSub);
    actions.appendChild(btnLost);
  } else {
    const btnOwed = document.createElement("button");
    btnOwed.type = "button";
    btnOwed.className = "btn btn-dark";
    btnOwed.textContent = "Mark Owed";
    btnOwed.onclick = () => {
      records = records.map(x => x.id === r.id ? ({ ...x, status: "owed" }) : x);
      save();
      renderView();
    };
    actions.appendChild(btnOwed);
  }

  // ---- Name click -> parent message (owed only) ----
  nameBtn.onclick = () => {
    const owedRows = records
      .filter(x => {
        const xs = String(x.status || "").trim().toLowerCase();
        const xStatus =
          (xs === "submitted" || xs === "submit" || xs === "sub" || xs === "done") ? "submitted" :
          (xs === "lost") ? "lost" :
          "owed";
        return xStatus === "owed" && norm(x.studentName) === norm(studentName);
      })
      .map(x => ({
        homework: String(x.homework || x.homeworkName || "").trim(),
        dueDate: String(x.dueDate || x.date || "").trim()
      }));

    if (!owedRows.length) {
      showToast("No owed homework for this student.");
      return;
    }

    const msg = buildParentMessage(studentName, owedRows);
    openModal("Message to parents - " + studentName, msg);
  };

  wrap.appendChild(top);
  wrap.appendChild(actions);

  return wrap;
}

function renderFilter(mode){
  viewEl.innerHTML = "";

  const card = document.createElement("div");
  card.className="card";
  card.innerHTML = `
    <div class="section-title"></div>

    <div style="display:grid;gap:8px;">
      <input id="q" placeholder="" />

      <select id="statusSel" style="width:100%;padding:10px 12px;border-radius:12px;border:1px solid #e5e7eb;font-size:14px;background:#fff;">
        <option value="all">Status: All</option>
        <option value="owed">Status: Owed</option>
        <option value="submitted">Status: Submitted</option>
        <option value="lost">Status: Lost</option>
      </select>
    </div>

    <div class="hint">Type to search, then choose a status filter.</div>
    <div id="list"></div>
  `;
  viewEl.appendChild(card);

  const title = card.querySelector(".section-title");
  const q = card.querySelector("#q");
  const statusSel = card.querySelector("#statusSel");
  const list = card.querySelector("#list");

  if(mode==="student"){
    title.textContent="Find homework by student";
    q.placeholder="Type student name...";
  }else if(mode==="homework"){
    title.textContent="Find students by homework";
    q.placeholder="Type homework...";
  }else{
    title.textContent="Find homework by class";
    q.placeholder="Type class...";
  }

  function renderList(){
    const query = String(q.value || "").trim().toLowerCase();
    const statusMode = String(statusSel.value || "all").trim().toLowerCase();

    list.innerHTML = "";
    if(!query) return;

    const filtered = records.filter(r => {
      const rStatus = String(r.status || "").trim().toLowerCase();
      if(statusMode !== "all" && rStatus !== statusMode) return false;

      const sName = String(r.studentName || "").trim().toLowerCase();
      const sHw   = String(r.homework || r.homeworkName || "").trim().toLowerCase();
      const sCls  = String(r.className || "").trim().toLowerCase();

      if(mode==="student") return sName.includes(query);
      if(mode==="homework") return sHw.includes(query);
      return sCls.includes(query);
    });

    filtered.forEach(r => list.appendChild(recordCard(r)));

    if(filtered.length === 0){
      const empty = document.createElement("div");
      empty.className="muted";
      empty.style.marginTop="8px";
      empty.textContent="No matches.";
      list.appendChild(empty);
    }
  }

  q.addEventListener("input", renderList);
  statusSel.addEventListener("change", renderList);
}

  function renderStudents(){
    viewEl.innerHTML = "";

    const card = document.createElement("div");
    card.className="card";
    card.innerHTML = `
      <div class="section-title">Roster by class</div>
      <div class="hint">Type a class, paste names (one per line), then save.</div>
      <div style="height:10px"></div>
      <input id="rc" placeholder="Class (e.g., 4C)" />
      <div style="height:10px"></div>
      <textarea id="rt" placeholder="Paste names (one per line)"></textarea>
      <div style="height:10px"></div>
      <button id="saveRoster" class="primary">Save roster for this class</button>

      <div style="height:14px"></div>
      <div class="section-title">Current rosters</div>
      <div id="rosters"></div>
    `;
    viewEl.appendChild(card);

    const rc = card.querySelector("#rc");
    const rt = card.querySelector("#rt");
    const saveRosterBtn = card.querySelector("#saveRoster");
    const rostersDiv = card.querySelector("#rosters");

    saveRosterBtn.onclick = ()=>{
      const c = String(rc.value||"").trim();
      if(!c){ showToast("Enter class first (e.g., 4C)."); return; }

      const list = splitLines(rt.value);
      if(!list.length){ showToast("Paste at least 1 name."); return; }

      const existing = new Set(roster.map(e => norm(e.className)+"|"+norm(e.studentName)));
      const adds = [];
      uniqCI(list).forEach(n=>{
        const key = norm(c)+"|"+norm(n);
        if(!existing.has(key)){
          existing.add(key);
          adds.push({ className:c, studentName:n });
        }
      });

      roster = roster.concat(adds).sort((a,b)=>{
        const ac = norm(a.className).localeCompare(norm(b.className));
        if(ac!==0) return ac;
        return norm(a.studentName).localeCompare(norm(b.studentName));
      });

      rt.value = "";
      save();
      showToast("Saved roster for " + c + ".");
      renderView();
    };

    const map = rosterByClass();
    const classes = classOptions();

    if(classes.length===0){
      rostersDiv.innerHTML = `<div class="muted">No rosters yet.</div>`;
      return;
    }

    classes.forEach(c=>{
      const box = document.createElement("div");
      box.style.border = "1px solid #e5e7eb";
      box.style.borderRadius = "14px";
      box.style.padding = "10px";
      box.style.marginTop = "10px";

      const top = document.createElement("div");
      top.style.display="flex";
      top.style.justifyContent="space-between";
      top.style.gap="10px";
      top.style.alignItems="center";

      const left = document.createElement("div");
      left.style.fontWeight="900";
      left.textContent = c;

      const clearBtn = document.createElement("button");
      clearBtn.className="btn btn-red";
      clearBtn.textContent="Clear class";
      clearBtn.onclick=()=>{
        const ok = window.confirm("Clear roster for class " + c + "?");
        if(!ok) return;
        roster = roster.filter(e => norm(e.className)!==norm(c));
        save();
        showToast("Cleared roster for " + c + ".");
        renderView();
      };

      top.appendChild(left);
      top.appendChild(clearBtn);

      const chips = document.createElement("div");
      chips.style.display="flex";
      chips.style.flexWrap="wrap";
      chips.style.gap="8px";
      chips.style.marginTop="8px";

      (map.get(c) || []).forEach(n=>{
        const chip = document.createElement("button");
        chip.className="chip";
        chip.textContent = n;
        chip.onclick=()=>{
          const ok = window.confirm("Remove " + n + " from " + c + "?");
          if(!ok) return;
          roster = roster.filter(e => !(norm(e.className)===norm(c) && norm(e.studentName)===norm(n)));
          save();
          renderView();
        };
        chips.appendChild(chip);
      });

      const note = document.createElement("div");
      note.className="hint";
      note.textContent="Tap a name to remove.";

      box.appendChild(top);
      box.appendChild(chips);
      box.appendChild(note);
      rostersDiv.appendChild(box);
    });
  }

  function renderAll(){
    viewEl.innerHTML = "";
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML = `
      <div class="section-title">All records</div>
      <div class="hint">Includes Submitted/Lost too.</div>
      <div id="list"></div>
    `;
    viewEl.appendChild(card);
    const list = card.querySelector("#list");
    records.forEach(r => list.appendChild(recordCard(r)));
    if(records.length===0){
      const empty = document.createElement("div");
      empty.className="muted";
      empty.style.marginTop="8px";
      empty.textContent="No records yet.";
      list.appendChild(empty);
    }
  }

  // Reset buttons
  document.getElementById("btnResetHW").onclick = ()=>{
    if(!armHW){
      armHW = true;
      document.getElementById("btnResetHW").textContent = "Tap again: Reset HW";
      clearTimeout(armHWTimer);
      armHWTimer = setTimeout(()=>{
        armHW=false;
        document.getElementById("btnResetHW").textContent = "Reset Homework";
      }, 3500);
      return;
    }
    const ok = window.confirm("Reset ALL homework records? Roster stays.");
    armHW = false;
    document.getElementById("btnResetHW").textContent = "Reset Homework";
    if(!ok) return;
    records = [];
    save();
    showToast("Homework records reset.");
    renderView();
  };

  document.getElementById("btnResetRoster").onclick = ()=>{
    if(!armRoster){
      armRoster = true;
      document.getElementById("btnResetRoster").textContent = "Tap again: Reset Roster";
      clearTimeout(armRosterTimer);
      armRosterTimer = setTimeout(()=>{
        armRoster=false;
        document.getElementById("btnResetRoster").textContent = "Reset Roster";
      }, 3500);
      return;
    }
    const ok = window.confirm("Reset ALL roster entries? Homework stays.");
    armRoster = false;
    document.getElementById("btnResetRoster").textContent = "Reset Roster";
    if(!ok) return;
    roster = [];
    save();
    showToast("Roster reset.");
    renderView();
  };

  // Boot
  load();
  renderTabs();
  renderView();
})();
</script>

    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js");
    });
